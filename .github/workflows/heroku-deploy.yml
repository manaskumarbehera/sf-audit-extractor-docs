name: CI and Deploy to Heroku

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: PMD JavaScript scan
        uses: pmd/pmd-github-action@v2
        with:
          rulesets: category/ecmascript/errorprone.xml,category/ecmascript/bestpractices.xml
          sourcePath: .
          analyzeModifiedFilesOnly: false

      - name: Quota guardrails (file and repo size)
        shell: bash
        run: |
          set -euo pipefail
          max_html_bytes=300000
          max_js_bytes=400000
          max_repo_bytes=12000000

          # Enforce max HTML file size
          while IFS= read -r -d '' file; do
            size=$(wc -c < "$file")
            if [ "$size" -gt "$max_html_bytes" ]; then
              echo "HTML quota exceeded: $file is ${size} bytes (max ${max_html_bytes})"
              exit 1
            fi
          done < <(find . -name "*.html" -print0)

          # Enforce max JS file size
          while IFS= read -r -d '' file; do
            size=$(wc -c < "$file")
            if [ "$size" -gt "$max_js_bytes" ]; then
              echo "JS quota exceeded: $file is ${size} bytes (max ${max_js_bytes})"
              exit 1
            fi
          done < <(find . -name "*.js" -print0)

          repo_size=$(du -sb . | awk '{print $1}')
          if [ "$repo_size" -gt "$max_repo_bytes" ]; then
            echo "Repo quota exceeded: ${repo_size} bytes (max ${max_repo_bytes})"
            exit 1
          fi

      - name: Route smoke checks
        shell: bash
        run: |
          set -euo pipefail
          node server.js &
          pid=$!
          trap "kill $pid" EXIT
          sleep 1
          for path in / /docs /guide /documentation.html /quick-start-guide.html /help.html /privacy-policy.html /quiz.html; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:3000${path}")
            if [ "$code" != "200" ]; then
              echo "Route check failed for ${path} with status ${code}"
              exit 1
            fi
          done

  deploy:
    needs: ci-checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        uses: akhileshns/heroku-deploy@v3.12.14
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: trackforcepro
          heroku_email: ${{ secrets.HEROKU_EMAIL }}

